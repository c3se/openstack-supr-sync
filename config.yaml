cloud_name: dev-cirrus
# cloud_name: cirrus
record_info:
  center: SE-SNIC-C3SE
  resource: dev-cirrus.c3se.chalmers.se 
  storage_resource: dev-cirrus.c3se.chalmers.se
  # resource: cirrus.c3se.chalmers.se 
  # storage_resource: cirrus.c3se.chalmers.se
  storage_share: block
  storage_media: disk
database:
  name: devel
  port: 5432
  host: cirrus-accounting
  user: devel
supr:
  api_base_url: https://api.supr.naiss.se/api
  resource_id: 111
  storage_id: 112
  # resource_id: 109
  # storage_id: 110
accounting:
  sampling_frequency: 900  # in seconds
  project_pattern: '^C3SE \d{4}/\d-\d+'
  spool_directory: '/var/spool/openstack-supr-sync/'
quota:
  storage_number: 100 # number of volumes/backups/snapshots
  default: # Normal usage limited
    cores: 256
    instances: 256
    ram: 2097152
  limited: # Usage limits after exceeding allocation
    cores: 1
    instances: 1
    ram: 2048
  threshold: -100 # Threshold in coins at which limited quota is enforced
log_file: '/var/log/openstack-supr-sync.log'
log_level: 'INFO'
bad_word_list: '/var/lib/openstack-supr-sync/bad_words.json'
network:
  external_network: dev-public
  external_dns: 129.16.1.53
  internal_gateway: 10.10.10.1
  internal_cidr: 10.10.10.0/24
email:
  headers:
    From: dev-cirrus@c3se.chalmers.se
    Bcc: 'leoniel@chalmers.se'
    subject: 'New account {username} on Cirrus @ C3SE'
    Reply-To: 'noreply@c3se.chalmers.se'
  smtp_server: localhost
  local_hostname: dev-cirrus-sync.c3se.chalmers.se
  url: 'https://dev-cloud.swesrc.chalmers.se'
  support_url: 'https://supr.naiss.se/support/?problem_type=accessing&centre_resource=c6'
